name: language_toggle_widget
description: A Flutter app to toggle phone language for language learning, with a homescreen/lockscreen widget.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Persistent storage for settings
  shared_preferences: ^2.2.3

  # Background task scheduling
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
